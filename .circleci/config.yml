version: 2.1

orbs:
  shellcheck: circleci/shellcheck@3.4.0
  go: circleci/go@4.0.0

jobs:
  lint:
    docker:
      - image: cimg/go:1.26
    resource_class: medium
    steps:
      - checkout
      - run: task mod-download
      - run:
          name: Install uv
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
      - go/with-cache:
          golangci-lint: true
          steps:
            - run: task ci:lint
            - store_test_results:
                path: ./test-reports
            - run: task ci:diff

  test:
    docker:
      - image: cimg/go:1.26
    resource_class: medium
    steps:
      - checkout
      - run: task mod-download
      - go/with-cache:
          steps:
            - run:
                name: Run tests
                command: task ci:test
                no_output_timeout: 90s
      - store_test_results:
          path: ./test-reports

  acceptance-test:
    docker:
      - image: cimg/go:1.26
    resource_class: medium
    steps:
      - checkout
      - run: task mod-download
      - go/with-cache:
          steps:
            - run:
                name: Run acceptance tests
                command: task ci:test -- ./acceptance/...
                no_output_timeout: 120s
      - store_test_results:
          path: ./test-reports

  build-smoke-test:
    docker:
      - image: cimg/go:1.26
    resource_class: medium
    steps:
      - checkout
      - run: task mod-download
      - go/with-cache:
          steps:
            - run:
                name: Build binary
                command: task build
            - run:
                name: Verify skill content is embedded
                command: |
                  mkdir -p ~/.claude
                  ./dist/chunk skill install
                  echo "OK: skill content embedded correctly"
                  head -5 ~/.claude/skills/chunk-review/SKILL.md

workflows:
  ci:
    jobs:
      - shellcheck/check
      - lint
      - test:
          context:
            - chunk-cli-test
      - acceptance-test:
          context:
            - chunk-cli-test
      - build-smoke-test:
          requires:
            - shellcheck/check
            - lint
            - test
            - acceptance-test
