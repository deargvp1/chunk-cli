version: 2.1

parameters:
  version:
    type: string
    default: ""
    description: "Version to release (e.g. 1.2.3). Omit to auto-increment patch."

jobs:
  release:
    docker:
      - image: cimg/go:1.26
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install goreleaser
          command: go install github.com/goreleaser/goreleaser/v2@latest
      - run:
          name: Install task
          command: go install github.com/go-task/task/v3/cmd/task@latest
      - run:
          name: Smoke test
          command: |
            go build -o ~/chunk .
            ~/chunk --version
      - run: task release VERSION=<< pipeline.parameters.version >>
      - persist_to_workspace:
          root: /tmp
          paths:
            - chunk-release-tag

  test-homebrew-install:
    macos:
      xcode: "26.3.0"
    resource_class: m4pro.medium
    steps:
      - attach_workspace:
          at: /tmp
      - run:
          name: Install chunk via Homebrew
          command: |
            brew update
            brew install CircleCI-Public/circleci/chunk
      - run:
          name: Verify installation of correct version
          # `/tmp/chunk-release-tag` is written by `task tag` as part of `task release`,
          # which we call above. The "v" prefix on the tag does not appear in the output
          # of `chunk --version` so we need to strip that off before comparing the tagged
          # version with the installed version.
          command: chunk --version | grep -qF "$(cat /tmp/chunk-release-tag | sed 's/v//')"

  test-linux-install:
    docker:
      - image: cimg/base:current
    resource_class: medium
    steps:
      - attach_workspace:
          at: /tmp
      - run:
          name: Install chunk via Homebrew
          command: |
            export NONINTERACTIVE=1
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
            echo 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"' >> "$BASH_ENV"
            source "$BASH_ENV"
            brew update
            brew trust circleci-public/circleci
            brew install CircleCI-Public/circleci/chunk
      - run:
          name: Verify installation of correct version
          command: chunk --version | grep -qF "$(cat /tmp/chunk-release-tag | sed 's/v//')"

workflows:
  release:
    jobs:
      - release:
          context:
            - chunk-cli-deploy
      - test-homebrew-install:
          requires:
            - release
      - test-linux-install:
          requires:
            - release
